<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Token Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark">CTM</div>
        <div>
          <h1>Codex Token Monitor</h1>
          <p id="statusLine">等待采集</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="button primary" type="button" title="刷新数据">刷新</button>
        <button id="exportBtn" class="button" type="button" title="导出当前 JSON">导出</button>
      </div>
    </header>

    <nav class="section-tabs" aria-label="页面导航">
      <a href="#overview">概览</a>
      <a href="#requests">请求明细</a>
    </nav>

    <section class="controls">
      <div class="quick">
        <button class="chip active" data-days="1" type="button">今日</button>
        <button class="chip" data-days="7" type="button">7天</button>
        <button class="chip" data-days="30" type="button">30天</button>
        <button class="chip" data-days="0" type="button">全部</button>
      </div>
      <label>
        <span>开始</span>
        <input id="startInput" type="datetime-local">
      </label>
      <label>
        <span>结束</span>
        <input id="endInput" type="datetime-local">
      </label>
      <label>
        <span>每页</span>
        <select id="pageSizeInput">
          <option value="7" selected>7</option>
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
    </section>

    <main>
      <section id="overview" class="metric-grid" aria-label="监控概览"></section>

      <section class="panel table-panel" id="requests">
        <div class="panel-head">
          <div>
            <h2>请求明细</h2>
            <span id="requestCount" class="muted">0</span>
          </div>
          <div class="pager">
            <button id="prevPageBtn" class="button" type="button">上一页</button>
            <span id="pageInfo" class="muted">1 / 1</span>
            <button id="nextPageBtn" class="button" type="button">下一页</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>记录时间</th>
                <th>记录 ID</th>
                <th>模型</th>
                <th id="serviceTierHeader" hidden>档位</th>
                <th>状态</th>
                <th>输入</th>
                <th>缓存</th>
                <th>输出</th>
                <th>总 token</th>
                <th>估算费用</th>
                <th>首输出估算</th>
                <th>响应耗时估算</th>
                <th>来源补充</th>
                <th>详情</th>
              </tr>
            </thead>
            <tbody id="requestRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="detailDialog">
      <form method="dialog">
        <button class="close" value="close" title="关闭">×</button>
      </form>
      <pre id="detailText"></pre>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
