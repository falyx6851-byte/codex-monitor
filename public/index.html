<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Codex Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="masthead">
      <div class="brand" aria-label="Codex Monitor">
        <div class="brand-mark" aria-hidden="true">C/</div>
        <div class="brand-copy">
          <span class="brand-kicker">LOCAL TELEMETRY</span>
          <h1>Codex Monitor</h1>
        </div>
      </div>

      <nav class="primary-nav" aria-label="页面导航">
        <a class="active" href="#overview">运行概览</a>
        <a href="#requests">请求明细</a>
      </nav>

      <div class="runtime-status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <div>
          <strong>本地采集运行中</strong>
          <span id="statusLine">正在连接数据源</span>
        </div>
      </div>

      <div class="top-actions">
        <button id="exportBtn" class="button quiet" type="button">导出 JSON</button>
        <button id="refreshBtn" class="button primary" type="button">刷新数据</button>
      </div>
    </header>

    <section class="commandbar" aria-label="查询条件">
      <div class="range-group">
        <span class="control-caption">统计周期</span>
        <div class="segmented" role="group" aria-label="快捷统计周期">
          <button class="chip active" data-days="1" type="button">今日</button>
          <button class="chip" data-days="7" type="button">7 天</button>
          <button class="chip" data-days="30" type="button">30 天</button>
          <button class="chip" data-days="0" type="button">全部</button>
        </div>
      </div>

      <div class="date-range">
        <label>
          <span>开始时间</span>
          <input id="startInput" type="datetime-local">
        </label>
        <span class="range-separator" aria-hidden="true">至</span>
        <label>
          <span>结束时间</span>
          <input id="endInput" type="datetime-local">
        </label>
      </div>

      <label class="page-size">
        <span>每页行数</span>
        <select id="pageSizeInput">
          <option value="7" selected>7 行</option>
          <option value="10">10 行</option>
          <option value="25">25 行</option>
          <option value="50">50 行</option>
          <option value="100">100 行</option>
        </select>
      </label>
    </section>

    <main>
      <div id="errorBanner" class="error-banner" role="alert" hidden></div>
      <section id="overview" class="metric-strip" aria-label="监控概览"></section>

      <section class="data-workbench" id="requests" aria-labelledby="requestsTitle">
        <div class="panel-head">
          <div class="panel-title">
            <span class="section-index" aria-hidden="true">01</span>
            <div>
              <h2 id="requestsTitle">请求明细</h2>
              <span id="requestCount" class="muted">等待数据</span>
            </div>
          </div>
          <div class="pager" aria-label="分页">
            <button id="prevPageBtn" class="icon-button" type="button" title="上一页" aria-label="上一页">←</button>
            <span id="pageInfo" class="page-info">1 / 1</span>
            <button id="nextPageBtn" class="icon-button" type="button" title="下一页" aria-label="下一页">→</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>记录时间</th>
                <th>记录 ID</th>
                <th>模型</th>
                <th id="serviceTierHeader" hidden>档位</th>
                <th>状态</th>
                <th class="num">输入</th>
                <th class="num">缓存</th>
                <th class="num">输出</th>
                <th class="num">总 Token</th>
                <th class="num">估算费用</th>
                <th class="num">首输出</th>
                <th class="num">响应耗时</th>
                <th>请求来源</th>
                <th class="action-column"><span class="sr-only">操作</span></th>
              </tr>
            </thead>
            <tbody id="requestRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="detailDialog">
      <div class="dialog-head">
        <div>
          <span class="brand-kicker">REQUEST PAYLOAD</span>
          <h2>请求记录详情</h2>
        </div>
        <form method="dialog">
          <button class="close icon-button" value="close" title="关闭" aria-label="关闭">×</button>
        </form>
      </div>
      <pre id="detailText"></pre>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
